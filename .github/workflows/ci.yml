name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install --upgrade pytest coverage pyyaml ruff

      - name: Check Python quality
        run: |
          ruff check codex/project-init-orchestrator/scripts scripts tests
          ruff format --check codex/project-init-orchestrator/scripts scripts tests

      - name: Validate repository
        run: python scripts/validate_repository.py

      - name: Run tests with coverage
        run: |
          coverage run --source=codex/project-init-orchestrator/scripts -m pytest
          coverage report --fail-under=80

      - name: Run behavioral evaluations
        run: python scripts/run_evaluations.py

      - name: Smoke-test safe installation
        run: |
          task_install_root="$(mktemp -d)/codex"
          CODEX_HOME="$task_install_root" ./install.sh --install
          python "$task_install_root/skills/project-init-orchestrator/scripts/pio.py" --version
